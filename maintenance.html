<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earvin Laureano — Back Soon</title>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#0c0c0c"/>
  <!-- self-contained favicon (data URI) so nothing else needs to load -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230c0c0c'/%3E%3Ctext x='16' y='21' font-family='Arial' font-weight='700' font-size='14' fill='%23C7A97F' text-anchor='middle'%3EEL%3C/text%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0c0c0c;--gold:#C7A97F;--gold2:#E8D4B0;--text:#E8D4B0;--muted:#8d887f;--border:rgba(255,255,255,0.06)}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden;position:relative}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(199,169,127,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(199,169,127,0.04) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
    .wrap{position:relative;z-index:2;max-width:560px}
    .logo{font-size:1rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);margin-bottom:2.5rem}
    .logo span{color:var(--gold)}
    .badge{display:inline-flex;align-items:center;gap:0.6rem;background:rgba(199,169,127,0.1);border:1px solid rgba(199,169,127,0.25);padding:0.45rem 1.1rem;border-radius:100px;margin-bottom:2rem}
    .badge-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite}
    .badge span{font-size:0.6rem;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold)}
    h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:800;line-height:1.1;color:#fff;margin-bottom:1.3rem}
    h1 em{font-style:italic;color:var(--gold);font-weight:700}
    p{font-size:1rem;color:var(--muted);line-height:1.9;max-width:440px;margin:0 auto 2.5rem}
    .contact{font-size:0.85rem;color:var(--muted);letter-spacing:0.03em}
    .contact a{color:var(--gold);text-decoration:none;font-weight:500}
    .contact a:hover{color:var(--gold2)}
    .foot{margin-top:3rem;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Earvin <span>Laureano</span></div>
    <div class="badge"><span class="badge-dot"></span><span>Back Shortly</span></div>
    <h1>We'll be right<br/><em>back.</em></h1>
    <p>The site is briefly down for some updates. Thanks for your patience — it'll be live again soon.</p>
    <div class="contact">Need something now? Email <a href="mailto:inquire@earvinlaureano.com">inquire@earvinlaureano.com</a></div>
    <div class="foot">Operations &amp; Web Partner · Remote Worldwide</div>
  </div>
</body>
</html>
